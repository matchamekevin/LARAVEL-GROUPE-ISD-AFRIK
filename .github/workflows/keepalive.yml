name: Keepalive ping

on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run keepalive ping
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          chmod +x scripts/keepalive.sh || true
          ./scripts/keepalive.sh
