services:
  - type: web
    name: isd-afrik-backend
    runtime: docker
    plan: free
    repo: https://github.com/your-username/your-repo
    branch: main
    dockerfilePath: Dockerfile.prod
    buildCommand: ''
    startCommand: ''
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      # IMPORTANT: Définissez APP_KEY dans Render UI (Environment) avec: php artisan key:generate --show
      - key: APP_URL
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      # Mail configuration (production): API provider (Resend)
      - key: MAIL_MAILER
        value: resend
      - key: RESEND_API_KEY
        value: 'REPLACE_WITH_RESEND_API_KEY'
      - key: MAIL_FROM_ADDRESS
        value: no-reply@your-domain.com
      - key: MAIL_FROM_NAME
        value: "ISD Afrik"
      - key: APP_KEY_SET
        value: 'true'
      - key: CORS_ALLOWED_ORIGINS
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: laravel-groupe-isd-afrik.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: isd-afrik-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: isd-afrik-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: isd-afrik-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: isd-afrik-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: isd-afrik-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: isd-afrik-db
          property: password
      - key: QUEUE_CONNECTION
        value: sync
      # Évite que le démarrage dépende de Postgres (cache/sessions en DB) si la DB n'est pas encore prête.
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: RUN_MIGRATIONS
        value: 'true'

  - type: web
    name: isd-afrik-frontend
    runtime: static
    repo: https://github.com/your-username/your-repo
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: public/build
    envVars:
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: isd-afrik-db
    plan: free
    ipAllowList: []
