services:
  - type: web
    name: isd-afrik-backend
    env: docker
    plan: free
    repo: https://github.com/your-username/your-repo
    branch: main
    dockerfilePath: Dockerfile.prod
    buildCommand: ''
    startCommand: ''
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_KEY
        value: ''
      - key: APP_URL
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: laravel-groupe-isd-afrik.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: isd-afrik-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: isd-afrik-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: isd-afrik-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: isd-afrik-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: isd-afrik-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: isd-afrik-db
          property: password

  - type: postgres
    name: isd-afrik-db
    plan: free

  - type: static
    name: isd-afrik-frontend
    repo: https://github.com/your-username/your-repo
    branch: main
    buildCommand: npm install && npm run build
    publishPath: public/build
    envVars:
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: NODE_ENV
        value: production
