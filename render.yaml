services:
  - type: web
    name: isd-afrik-backend
    env: docker
    plan: free
    repo: https://github.com/your-username/your-repo
    branch: main
    dockerfilePath: Dockerfile.prod
    buildCommand: ''
    startCommand: ''
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_KEY
        # Remplacez ceci par la valeur sécurisée de l'APP_KEY en production
        value: 'base64:REPLACE_WITH_YOUR_APP_KEY'
      - key: APP_URL
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      # Mail configuration (production): Brevo SMTP
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: '587'
      - key: MAIL_USERNAME
        value: '91a8ac001@smtp-brevo.com'
      - key: MAIL_PASSWORD
        value: 'REPLACE_WITH_BREVO_SMTP_KEY'
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: no-reply@your-domain.com
      - key: MAIL_FROM_NAME
        value: "ISD Afrik"
      - key: APP_KEY_SET
        value: 'true'
      - key: CORS_ALLOWED_ORIGINS
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: laravel-groupe-isd-afrik.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: isd-afrik-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: isd-afrik-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: isd-afrik-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: isd-afrik-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: isd-afrik-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: isd-afrik-db
          property: password

  - type: postgres
    name: isd-afrik-db
    plan: free

  - type: static
    name: isd-afrik-frontend
    repo: https://github.com/your-username/your-repo
    branch: main
    buildCommand: npm install && npm run build
    publishPath: public/build
    envVars:
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: NODE_ENV
        value: production

  # Worker service to process queued jobs (emails, notifications)
  - type: worker
    name: isd-afrik-worker
    env: docker
    plan: free
    repo: https://github.com/your-username/your-repo
    branch: main
    dockerfilePath: Dockerfile.prod
    startCommand: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_KEY
        value: 'base64:REPLACE_WITH_YOUR_APP_KEY'
      - key: DB_CONNECTION
        value: pgsql
      - key: VITE_API_BASE
        value: https://laravel-groupe-isd-afrik.onrender.com
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: '587'
      - key: MAIL_USERNAME
        value: '91a8ac001@smtp-brevo.com'
      - key: MAIL_PASSWORD
        value: 'REPLACE_WITH_BREVO_SMTP_KEY'
      - key: MAIL_ENCRYPTION
        value: tls
